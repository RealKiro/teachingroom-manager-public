# ============================================================
#  TeachingRoom Manager — Docker Compose
#  用法：
#    docker compose up -d
#  前置条件：
#    启动前请设置环境变量 SESSION_SECRET
#    例如：export SESSION_SECRET="$(openssl rand -hex 32)"
#         docker compose up -d
# ============================================================

services:
  teachingroom:
    # ── 镜像来源 ──────────────────────────────────────────
    # 方案 A：拉取 GHCR 预构建镜像（推荐）
    # 如果你 fork 了此仓库，请将组织名替换为你的 GitHub 用户名
    image: ghcr.io/teachingroom-manager-public/teachingroom-manager:latest

    # 方案 B：本地自行构建（取消注释 build: 块，并注释上面的 image: 行）
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile

    container_name: teachingroom-manager

    ports:
      - "3000:3000"

    environment:
      # ── 服务端口 ──────────────────────────────────────
      - PORT=3000

      # ── 必填 ──────────────────────────────────────────
      # Session 加密密钥（建议用 openssl rand -hex 32 生成）
      - SESSION_SECRET=${SESSION_SECRET:?容器启动失败：请设置 SESSION_SECRET 环境变量}

      # ── 可选 ──────────────────────────────────────────
      # 首次启动的管理员密码（至少 12 位）；留空则自动生成
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}

      # 数据库文件路径
      - DB_PATH=/app/data/teachingroom.sqlite

      # 自动备份保留份数
      - AUTO_BACKUP_KEEP=200

      # 备份镜像目录（可选，用于同步到另一块磁盘）
      - BACKUP_MIRROR_DIR=

      # 基础数据 API 的 CORS 白名单（逗号分隔，留空则不开放跨域）
      - BASE_DATA_CORS_ORIGIN=

      # Node 环境
      - NODE_ENV=production

    volumes:
      # ── 持久化数据目录 ──────────────────────────────────
      # 数据库、令牌、session 密钥
      - ./data:/app/data
      # 数据库自动/手动备份
      - ./backups:/app/backups
      # 照片上传
      - ./uploads:/app/uploads
      # Excel 导出
      - ./exports:/app/exports

      # 首次初始化用的 Excel 演示数据（只读）
      - ./初始化数据表格（虚拟）.xlsx:/app/初始化数据表格（虚拟）.xlsx:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
